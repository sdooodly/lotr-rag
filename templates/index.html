<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTR RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #d4d4d8;
            background: #09090b;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('{{ url_for("static", filename="images/map.jpeg") }}') center/cover no-repeat;
            opacity: 0.12;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(9,9,11,0.5) 0%, rgba(9,9,11,0.95) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            text-align: center;
            padding: 1.5rem 0;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #c9a84c;
            letter-spacing: 0.05em;
        }
        header p {
            font-size: 0.8rem;
            color: #71717a;
            margin-top: 0.3rem;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            scrollbar-width: thin;
            scrollbar-color: #27272a transparent;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

        .msg {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            animation: fadeIn 0.2s ease;
        }
        .user {
            align-self: flex-end;
            background: rgba(201, 168, 76, 0.12);
            border: 1px solid rgba(201, 168, 76, 0.2);
            color: #e4e4e7;
        }
        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3f3f46;
            font-size: 0.85rem;
        }

        .input-area { flex-shrink: 0; padding: 1rem 0 0.5rem; }
        form {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 0.4rem;
        }
        input {
            flex: 1;
            padding: 0.7rem 0.8rem;
            background: transparent;
            border: none;
            color: #e4e4e7;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        input::placeholder { color: #52525b; }
        button {
            padding: 0.6rem 1.2rem;
            background: #c9a84c;
            color: #09090b;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #d4b85c; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #loading {
            display: none;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.8rem;
            color: #71717a;
        }
        .dots::after { content: ''; animation: dots 1.2s steps(4) infinite; }
        @keyframes dots {
            0% { content: ''; } 25% { content: '.'; }
            50% { content: '..'; } 75% { content: '...'; }
        }

        @media (max-width: 640px) {
            .container { padding: 1rem; }
            header h1 { font-size: 1.25rem; }
            .msg { max-width: 92%; font-size: 0.85rem; }
            button { padding: 0.6rem 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Lord of the Rings RAG</h1>
            <p>Ask anything about Middle-earth</p>
        </header>
        <div id="chat" role="log" aria-live="polite">
            <div class="empty" id="empty">Ask a question to begin</div>
        </div>
        <div id="loading"><span class="dots">Thinking</span></div>
        <div class="input-area">
            <form id="form" role="search" aria-label="Ask a question">
                <label for="question" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Question</label>
                <input id="question" name="question" placeholder="What happened at Helm's Deep?" autocomplete="off" required />
                <button type="submit">Ask</button>
            </form>
        </div>
    </div>
    <script>
        const form = document.getElementById("form");
        const chat = document.getElementById("chat");
        const input = document.getElementById("question");
        const loading = document.getElementById("loading");
        const empty = document.getElementById("empty");
        const btn = form.querySelector("button");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if (!q) return;
            if (empty) empty.remove();
            addMsg(q, "user");
            input.value = "";
            loading.style.display = "block";
            btn.disabled = true;
            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: q })
                });
                const data = await res.json();
                addMsg(data.answer || data.error, data.error ? "user" : "bot");
            } catch {
                addMsg("Connection error. Please try again.", "bot");
            }
            loading.style.display = "none";
            btn.disabled = false;
            input.focus();
        });

        function addMsg(text, type) {
            const div = document.createElement("div");
            div.className = "msg " + type;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
